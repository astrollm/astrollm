# AstroLLM Docker Compose — Development Stack
# Usage: docker compose up -d

services:
  # PostgreSQL with pgvector for RAG
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: astrollm
      POSTGRES_USER: astrollm
      POSTGRES_PASSWORD: ${DB_PASSWORD:-astrollm_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astrollm"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Embedding model server
  embedder:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.5
    command: --model-id BAAI/bge-large-en-v1.5 --port 8081
    ports:
      - "8081:8081"
    volumes:
      - embedder_cache:/data

  # API server (Elysia)
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgres://astrollm:${DB_PASSWORD:-astrollm_dev}@db:5432/astrollm
      EMBEDDER_URL: http://embedder:8081
      INFERENCE_URL: http://inference:8080
      ADS_API_KEY: ${ADS_API_KEY}
    depends_on:
      db:
        condition: service_healthy

  # Web frontend (TanStack Start)
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    ports:
      - "3000:3000"
    environment:
      API_URL: http://api:3001
    depends_on:
      - api

  # Inference server (llama.cpp for dev, vLLM for production)
  # Uncomment when model is ready
  # inference:
  #   image: ghcr.io/ggerganov/llama.cpp:server
  #   command: -m /models/astrollm-8b-q4_k_m.gguf --port 8080 --host 0.0.0.0
  #   ports:
  #     - "8080:8080"
  #   volumes:
  #     - ./models:/models

volumes:
  pgdata:
  embedder_cache:
