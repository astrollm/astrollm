site_name: AstroLLM
site_description: A domain-specialized Large Language Model for Astronomy & Astrophysics
site_url: https://astrollm.github.io/astrollm
repo_url: https://github.com/astrollm/astrollm
repo_name: astrollm/astrollm

docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - attr_list
  - md_in_html
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - toc:
      permalink: true

# KaTeX math support — add when docs start using equations:
# See https://squidfunk.github.io/mkdocs-material/reference/math/
# Requires: pymdownx.arithmatex extension + custom JS snippet in docs/javascripts/katex.js

nav:
  - Home: index.md
  - Getting Started:
    - Quickstart: QUICKSTART.md
    - Learning Path (Build-Aligned): LEARNING_PATH_V1.md
    - Learning Path (Pedagogical): LEARNING_PATH.md
  - Architecture:
    - System Overview: ARCHITECTURE_V2.md
    - Data Sources: DATA_SOURCES.md
  - Research:
    - Overview: research/index.md
    - Research Log: RESEARCH_LOG.md
    - Experiments:
      - research/experiments/index.md
      - EXP-000 Baselines: research/experiments/EXP-000-baselines.md
  - Lab Reports:
    - Overview: lab/index.md
  - Planning:
    - V1 Final Plan: V1_FINAL_PLAN.md
    - Master Plan: MASTER_PLAN.md
  - Archive:
    - archive/ARCHITECTURE.md
    - archive/GETTING_STARTED_12_WEEKS.md
    - archive/REVISION_NOTES.md
