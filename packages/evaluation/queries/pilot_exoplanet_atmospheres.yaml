# Pilot retrieval eval — query set (exoplanet atmospheres), grounded in the 500-abstract corpus.
# Reviewed 2026-05-31 (see docs/research/pilot-label-review.md for the full rationale).
#
# Two kinds of query, scored the same way but meaning different things:
#   - q01-q18 NAMED-TARGET: relevance judged by entity match + abstract; aims to approximate the
#     full in-corpus relevant set, so recall misses are meaningful. (q15 has no in-corpus target.)
#   - q19-q30 BROAD/TOPICAL: labeled with a small set of KNOWN-ITEM landmark papers per topic,
#     NOT an exhaustive relevant set. Recall@10 here means "did the landmark surface", not true
#     topical recall — a pooled precision@k judgment is the proper future eval for these.
#
# Empty (skipped by eval_retrieval.py, which reports it): q15 (LHS 475b not in this corpus slice).

queries:
  - { id: q01, target: "WASP-39b", query: "JWST CO2 detection in WASP-39b transmission spectrum", expected_bibcodes: ["2023Natur.614..649J", "2023Natur.614..664A", "2023Natur.614..653A"] }
  - { id: q02, target: "WASP-39b", query: "sulfur dioxide photochemistry in WASP-39b", expected_bibcodes: ["2023Natur.617..483T"] }
