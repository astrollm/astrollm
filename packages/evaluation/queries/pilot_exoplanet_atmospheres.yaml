# Pilot retrieval eval — candidate query set (exoplanet atmospheres)
#
# DRAFT FOR REVIEW. 30 candidate queries seeded with named targets and molecule/process
# topics that the "abs:\"exoplanet atmosphere\"" ADS corpus should be able to answer.
#
# expected_bibcodes is intentionally EMPTY: a query only "counts" once it is grounded in
# the corpus you actually ingest. To fill them after running ingest_ads.py:
#   1) uv run python packages/rag/src/pilot_retrieval.py "<query>" --k 10
#   2) confirm which returned bibcodes are truly relevant (and add known-relevant ones
#      that did NOT appear — those are the recall misses worth measuring), then list them.
# eval_retrieval.py skips any query whose expected_bibcodes is empty (and reports it),
# so this file runs as-is and the score reflects only the queries you have curated.

queries:
