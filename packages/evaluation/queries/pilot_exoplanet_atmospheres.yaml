  - { id: q05, target: "TRAPPIST-1e", query: "does TRAPPIST-1e have a secondary atmosphere", expected_bibcodes: ["2020ApJ...898L..33P", "2020ApJ...901..126W"] }
  # reviewed 2026-05-31: removed 2023ApJ...955L..22L (a transmission/stellar-contamination study —
  # wrong observable for "dayside thermal emission"); the secondary-eclipse paper is the bullseye.
  - { id: q06, target: "TRAPPIST-1b", query: "TRAPPIST-1b dayside thermal emission bare rock", expected_bibcodes: ["2023ApJ...952L...4I"] }
  # reviewed 2026-05-31: added 2018A&A...612A..53P (alkali/Na lines in HD 189733b — the missed
