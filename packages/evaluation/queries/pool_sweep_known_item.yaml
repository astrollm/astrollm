# Known-item / broad-entity partition for the pool-depth sweep (PR #7).
#
# A PRIORI and RANKING-BLIND. The split IS the pilot gold-set header's named-target vs
# broad/topical distinction, fixed in PR #3/#4 — before any widening or sweep rankings existed.
# It is committed here BEFORE the sweep is scored, to remove the researcher-degrees-of-freedom
# that justified deferring the scored stratified report (b) out of PR #6.
#
#   KNOWN-ITEM (scored): named-target queries q01-q18. The gold is the faithful canonical landmark
#     set for a specific planet + result — closed and stable under corpus growth (newer papers are
#     follow-ups, not a new "canonical landmark for THIS specific question"). So Recall@k is true
#     recall of the canonical result, and |relevant| stays << k. (q15 has no in-corpus target ->
#     unscored; LHS 475b is phrase-excluded, see corpus-widening.md membership probe.)
#   BROAD-ENTITY (measured): topical molecule/process queries q19-q30. The gold is a NON-exhaustive
#     landmark proxy for an open relevant set that scales with the corpus (the pilot's own caveat:
#     "Recall@10 means did the landmark surface, not true topical recall"). On a 5x corpus the proxy
#     is even less representative, so Recall@k is reported as a COVERAGE MEASUREMENT, not recall.
#
# Note on terminology: the pilot labeled the topical queries with known-item LANDMARKS as a coping
# strategy for their open relevant sets; under the |relevant| << k criterion those are exactly the
# BROAD-ENTITY queries here. The KNOWN-ITEM *scored* partition is the named-target set.
#
# The landmark bibcodes below are the FROZEN gold from pilot_exoplanet_atmospheres.yaml verbatim;
# the original 29 labels are UNCHANGED. The sweep asserts these equal the frozen gold, so this file
# is a committed audit record of the partition, not a relabel.

provenance:
